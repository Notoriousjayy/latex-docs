# .github/workflows/_build-latex.yml
# ============================================================================
# REUSABLE WORKFLOW FOR BUILDING LATEX DOCUMENTS
# ============================================================================
# Renders PlantUML, builds LaTeX, and uploads:
#   - per-category PDFs    (`pdfs-<category>`)
#   - per-category diagrams (`diagrams-<category>` — PNG + SVG)
#   - aggregated artifacts (`latex-pdfs`, `latex-diagrams`) for Pages/Release
# Uses the unified render-plantuml composite action (DRY).
# ============================================================================
name: _Build LaTeX (Reusable)

on:
  workflow_call:
    inputs:
      build-all:
        description: 'Build all documents (ignore change detection)'
        type: boolean
        default: false
      document-category:
        description: 'Category filter (architecture, devops, security, etc.) or empty for all'
        type: string
        default: ''
      upload-artifacts:
        description: 'Upload built PDFs and diagrams as artifacts'
        type: boolean
        default: true
      render-plantuml:
        description: 'Render PlantUML diagrams before LaTeX compilation'
        type: boolean
        default: true
      generate-jpg:
        description: 'Generate JPG files from PNG (passed to PlantUML action)'
        type: boolean
        default: false
    outputs:
      pdf-count:
        description: 'Total PDFs built'
        value: ${{ jobs.aggregate.outputs.total }}
      diagram-count:
        description: 'Total PlantUML diagram outputs (PNG + SVG)'
        value: ${{ jobs.aggregate.outputs.diagrams }}
      artifact-name:
        description: 'Name of merged PDFs artifact'
        value: 'latex-pdfs'
      diagrams-artifact-name:
        description: 'Name of merged diagrams artifact'
        value: 'latex-diagrams'

# Force any JS-based actions still pinned to Node.js 20 internally
# (e.g., the upload-artifact@v4.6.2 nested inside upload-pages-artifact@v3)
# to run on Node.js 24. Removes the Sept-2025 deprecation warning and aligns
# with GitHub's June-2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # Stage 1: Determine what changed and prepare build matrix
  # ============================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has-changes: ${{ steps.changes.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          set -euo pipefail

          if [[ "${{ inputs.build-all }}" == "true" ]]; then
            echo "Build-all requested"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual trigger - building everything"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$CHANGED"

          TEX_CHANGES=$(echo "$CHANGED" | grep -E '\.tex$' || echo "")
          PUML_CHANGES=$(echo "$CHANGED" | grep -E '\.puml$' || echo "")
          WORKFLOW_CHANGES=$(echo "$CHANGED" | grep -E '\.github/' || echo "")
          TOOLING_CHANGES=$(echo "$CHANGED" | grep -E '^tooling/' || echo "")

          if [[ -n "$TEX_CHANGES" || -n "$PUML_CHANGES" || -n "$WORKFLOW_CHANGES" || -n "$TOOLING_CHANGES" || -z "$CHANGED" ]]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix of document categories
        id: matrix
        run: |
          set -euo pipefail

          CATEGORY="${{ inputs.document-category }}"
          EXCLUDE_DIRS="common|jpg|png|svg|puml"

          if [[ -n "$CATEGORY" ]]; then
            echo "matrix={\"category\":[\"$CATEGORY\"]}" >> "$GITHUB_OUTPUT"
          else
            CATEGORIES=()
            for dir in src/*/; do
              dirname=$(basename "$dir")
              if echo "$dirname" | grep -qE "^($EXCLUDE_DIRS)$"; then
                continue
              fi
              # Include category if it has either a .tex root OR any .puml diagrams.
              # This way pure-diagram categories also publish their PNG/SVG outputs.
              if find "$dir" -name '*.tex' -type f -exec grep -l '^\s*\\documentclass' {} \; -quit 2>/dev/null | grep -q . \
                 || find "$dir" -name '*.puml' -type f -print -quit 2>/dev/null | grep -q .; then
                CATEGORIES+=("$dirname")
                echo "Found document category: $dirname"
              fi
            done

            if [[ ${#CATEGORIES[@]} -eq 0 ]]; then
              echo "::error::No document categories found in src/"
              exit 1
            fi

            MATRIX_JSON=$(printf '%s\n' "${CATEGORIES[@]}" | jq -R . | jq -sc .)
            echo "matrix={\"category\":$MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================================
  # Stage 2: Build documents (using unified PlantUML action)
  # ============================================================================
  build:
    needs: prepare
    if: needs.prepare.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ----------------------------------------------------------------------
      # PlantUML Rendering - Uses the SINGLE render unit (DRY)
      # ----------------------------------------------------------------------
      - name: Render PlantUML diagrams for ${{ matrix.category }}
        if: inputs.render-plantuml
        id: plantuml
        uses: ./.github/actions/render-plantuml
        with:
          source-dir: 'src/${{ matrix.category }}'
          formats: 'png svg'
          generate-jpg: ${{ inputs.generate-jpg && 'true' || 'false' }}
          fail-on-error: 'false'  # Don't fail build on diagram issues

      - name: Verify PlantUML outputs
        if: inputs.render-plantuml
        run: |
          echo "=== PlantUML Render Results for ${{ matrix.category }} ==="
          echo "Diagrams found: ${{ steps.plantuml.outputs.diagram_count || 0 }}"
          echo "Files rendered: ${{ steps.plantuml.outputs.rendered_count || 0 }}"
          echo "Failures: ${{ steps.plantuml.outputs.failed_count || 0 }}"
          echo ""

          CATEGORY_DIR="src/${{ matrix.category }}"

          echo "SVG files (first 20):"
          find "$CATEGORY_DIR" -type f -name "*.svg" -path "*/svg/*" 2>/dev/null | head -20 || echo "  (none)"

          echo ""
          echo "PNG files (first 20):"
          find "$CATEGORY_DIR" -type f -name "*.png" -path "*/png/*" 2>/dev/null | head -20 || echo "  (none)"

      # ----------------------------------------------------------------------
      # Stage rendered diagrams into a flat collected-diagrams/<category>/...
      # tree so downstream jobs (artifacts, Pages) get a clean layout that
      # mirrors the source structure.
      # ----------------------------------------------------------------------
      - name: Collect rendered PlantUML diagrams
        if: inputs.render-plantuml
        id: collect-diagrams
        run: |
          set -euo pipefail

          CATEGORY="${{ matrix.category }}"
          CATEGORY_DIR="src/${CATEGORY}"
          DEST_ROOT="$GITHUB_WORKSPACE/collected-diagrams/${CATEGORY}"

          mkdir -p "$DEST_ROOT"

          png_count=0
          svg_count=0
          jpg_count=0

          # Walk all */png/, */svg/, */jpg/ output directories under the
          # category and copy their files to a parallel layout under
          # collected-diagrams/<category>/<rel-source-dir>/{png,svg,jpg}/...
          # The "rel-source-dir" is the path of the directory *containing*
          # the png/svg/jpg subfolder, relative to src/<category>/.
          if [[ -d "$CATEGORY_DIR" ]]; then
            while IFS= read -r -d '' fmt_dir; do
              [[ -d "$fmt_dir" ]] || continue
              fmt="$(basename "$fmt_dir")"      # png | svg | jpg
              parent="$(dirname "$fmt_dir")"    # source dir containing the format folder
              # Path of the source dir relative to src/<category>/
              rel="${parent#${CATEGORY_DIR}}"
              rel="${rel#/}"
              if [[ -z "$rel" ]]; then
                target="${DEST_ROOT}/${fmt}"
              else
                target="${DEST_ROOT}/${rel}/${fmt}"
              fi
              mkdir -p "$target"
              # Copy only the expected file types
              while IFS= read -r -d '' f; do
                cp -f "$f" "$target/" || true
                case "$fmt" in
                  png) png_count=$((png_count + 1)) ;;
                  svg) svg_count=$((svg_count + 1)) ;;
                  jpg) jpg_count=$((jpg_count + 1)) ;;
                esac
              done < <(find "$fmt_dir" -maxdepth 1 -type f \( -name '*.png' -o -name '*.svg' -o -name '*.jpg' \) -print0 2>/dev/null)
            done < <(find "$CATEGORY_DIR" -type d \( -name png -o -name svg -o -name jpg \) -print0 2>/dev/null)
          fi

          total=$((png_count + svg_count + jpg_count))
          echo "Collected diagram files for ${CATEGORY}: png=${png_count} svg=${svg_count} jpg=${jpg_count} total=${total}"
          echo "png_count=${png_count}" >> "$GITHUB_OUTPUT"
          echo "svg_count=${svg_count}" >> "$GITHUB_OUTPUT"
          echo "jpg_count=${jpg_count}" >> "$GITHUB_OUTPUT"
          echo "total=${total}"        >> "$GITHUB_OUTPUT"

          if [[ -d "$DEST_ROOT" ]]; then
            echo ""
            echo "=== collected-diagrams/${CATEGORY} (top 30 entries) ==="
            find "$DEST_ROOT" -type f | sort | head -30 || true
          fi

      # ----------------------------------------------------------------------
      # LaTeX Setup and Compilation
      # ----------------------------------------------------------------------
      - name: Setup LaTeX
        uses: ./.github/actions/setup-latex

      - name: Build ${{ matrix.category }} LaTeX roots (recursive) and stage outputs
        id: build
        shell: bash
        run: |
          set -euo pipefail

          # Make tooling/latex/latex-docs-style.sty resolvable from each
          # leaf doc directory we pushd into below. Trailing `//:` tells
          # kpathsea to recurse, then fall through to the system tree.
          export TEXINPUTS="${GITHUB_WORKSPACE}/tooling/latex//:${TEXINPUTS:-}"

          CATEGORY="${{ matrix.category }}"
          CATEGORY_DIR="src/${CATEGORY}"

          echo "=== Building LaTeX roots under ${CATEGORY_DIR} (recursive) ==="

          mkdir -p collected-pdfs build-out build-logs

          # Discover standalone LaTeX roots within the category (no depth limit)
          mapfile -d '' roots < <(grep -RIlZ --include='*.tex' '^[[:space:]]*\\documentclass' "${CATEGORY_DIR}" 2>/dev/null | sort -z || true)

          if [[ ${#roots[@]} -eq 0 ]]; then
            echo "No LaTeX roots found under ${CATEGORY_DIR} (this is fine for diagram-only categories)"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found ${#roots[@]} LaTeX roots"

          built=0
          failed=0
          failed_list=()

          detect_engine() {
            local f="$1"
            if grep -qiE '^[[:space:]]*%[[:space:]]*!TeX[[:space:]]+program[[:space:]]*=[[:space:]]*lualatex' "$f"; then
              echo "lualatex"
            elif grep -qiE '^[[:space:]]*%[[:space:]]*!TeX[[:space:]]+program[[:space:]]*=[[:space:]]*xelatex' "$f"; then
              echo "xelatex"
            else
              echo "pdflatex"
            fi
          }

          common_args='-interaction=nonstopmode -halt-on-error -file-line-error -shell-escape'

          for tex in "${roots[@]}"; do
            [[ -z "$tex" ]] && continue

            rel="${tex#src/}"
            rel_dir="$(dirname "$rel")"
            base="$(basename "$rel" .tex)"

            out_dir="$GITHUB_WORKSPACE/build-out/${rel_dir}/${base}"
            log_dir="$GITHUB_WORKSPACE/build-logs/${rel_dir}"
            dest_dir="$GITHUB_WORKSPACE/collected-pdfs/${rel_dir}"

            mkdir -p "$out_dir" "$log_dir" "$dest_dir"

            engine="$(detect_engine "$tex")"

            echo ""
            echo "═══════════════════════════════════════════════════"
            echo "Building: ${tex} (engine=${engine})"
            echo "═══════════════════════════════════════════════════"

            stdout_log="${log_dir}/${base}.build.stdout.txt"
            stderr_log="${log_dir}/${base}.build.stderr.txt"

            doc_dir="$(dirname "$tex")"
            tex_file="$(basename "$tex")"

            pushd "$doc_dir" >/dev/null

            if [[ "$engine" == "lualatex" ]]; then
              latexmk -pdf \
                -outdir="$out_dir" \
                -pdflatex="lualatex ${common_args} %O %S" \
                "$tex_file" \
                >"$stdout_log" 2>"$stderr_log" || true
            elif [[ "$engine" == "xelatex" ]]; then
              latexmk -pdf \
                -outdir="$out_dir" \
                -pdflatex="xelatex ${common_args} %O %S" \
                "$tex_file" \
                >"$stdout_log" 2>"$stderr_log" || true
            else
              latexmk -pdf \
                -outdir="$out_dir" \
                -pdflatex="pdflatex ${common_args} %O %S" \
                "$tex_file" \
                >"$stdout_log" 2>"$stderr_log" || true
            fi

            popd >/dev/null

            built_pdf="${out_dir}/${base}.pdf"
            dest_pdf="${dest_dir}/${base}.pdf"

            if [[ -f "$built_pdf" ]]; then
              cp -f "$built_pdf" "$dest_pdf"
              # Also copy latexmk log for debugging
              cp -f "${out_dir}/${base}.log" "$dest_dir/${base}.log.txt" 2>/dev/null || true
              cp -f "$stdout_log" "$dest_dir/${base}.build.stdout.txt" 2>/dev/null || true
              cp -f "$stderr_log" "$dest_dir/${base}.build.stderr.txt" 2>/dev/null || true
              echo "  ✓ ${dest_pdf}"
              ((++built))
            else
              echo "  ✗ FAILED: ${tex}"
              echo "    stdout: ${stdout_log#${GITHUB_WORKSPACE}/}"
              echo "    stderr: ${stderr_log#${GITHUB_WORKSPACE}/}"

              # Copy log files to build-logs for artifact upload
              cp -f "${out_dir}/${base}.log" "${log_dir}/${base}.log.txt" 2>/dev/null || true

              # ----------------------------------------------------------
              # IMPROVED INLINE ERROR REPORTING
              # ----------------------------------------------------------
              # The historical grep '^!' missed several real failure modes
              # observed in this repo, e.g.:
              #   pdfTeX error (font expansion): auto expansion is only ...
              #   ./file.tex:LINE: pdfTeX error (...) ...
              # Catch all of:
              #   - "! ..."                         standard LaTeX error
              #   - "pdfTeX error"                  font/PDF backend errors
              #   - "TeX capacity exceeded"         resource exhaustion
              #   - "<file>:<line>:"                file-line-error mode lines
              #   - "Emergency stop"                fatal stop marker
              #   - "Fatal error occurred"          summary marker
              # ----------------------------------------------------------
              echo ""
              echo "::group::Error details for ${base}.tex"

              if [[ -f "${out_dir}/${base}.log" ]]; then
                echo "─── LaTeX / pdfTeX errors ───"
                grep -nE '^!|pdfTeX error|TeX capacity exceeded|Emergency stop|Fatal error occurred|^[^:]+\.tex:[0-9]+:' \
                     "${out_dir}/${base}.log" 2>/dev/null | head -40 || echo "(no errors detected by patterns)"

                echo ""
                echo "─── Undefined References / Missing Files ───"
                grep -inE 'file .*not found|package .*not found|missing|undefined' \
                     "${out_dir}/${base}.log" 2>/dev/null | head -15 || echo "(none)"

                echo ""
                echo "─── Last 25 log lines (context) ───"
                tail -25 "${out_dir}/${base}.log" 2>/dev/null || true
              fi

              # Show stderr if non-empty
              if [[ -s "$stderr_log" ]]; then
                echo ""
                echo "─── stderr ───"
                head -30 "$stderr_log"
              fi

              echo "::endgroup::"

              failed_list+=("$tex")
              ((++failed))
            fi
          done

          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "BUILD SUMMARY (${CATEGORY})"
          echo "═══════════════════════════════════════════════════"
          echo "Built:  ${built}"
          echo "Failed: ${failed}"

          if (( failed > 0 )); then
            printf '%s\n' "${failed_list[@]}" > "$GITHUB_WORKSPACE/collected-pdfs/${CATEGORY}/FAILED_BUILDS.txt" 2>/dev/null || true
          fi

          # Output count for visibility
          count=$(find "$GITHUB_WORKSPACE/collected-pdfs/${CATEGORY}" -name "*.pdf" -type f 2>/dev/null | wc -l | tr -d ' ' || echo 0)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Collected $count PDFs under collected-pdfs/${CATEGORY}"

          # Fail the job if any build failed
          if (( failed > 0 )); then
            exit 1
          fi

      # ----------------------------------------------------------------------
      # Display detailed error logs for failed builds
      # ----------------------------------------------------------------------
      - name: Display failed build logs
        if: failure()
        shell: bash
        run: |
          set -euo pipefail

          CATEGORY="${{ matrix.category }}"

          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║           DETAILED ERROR LOGS FOR FAILED BUILDS                  ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  Category: ${CATEGORY}"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""

          # Find all stderr files in build-logs
          shopt -s nullglob globstar

          for stderr_file in build-logs/**/*.build.stderr.txt; do
            [[ ! -f "$stderr_file" ]] && continue

            # Get corresponding stdout file
            stdout_file="${stderr_file%.stderr.txt}.stdout.txt"

            # Extract the document name from path
            doc_path="${stderr_file#build-logs/}"
            doc_name="${doc_path%.build.stderr.txt}"

            # Check if this build actually failed (no corresponding PDF)
            pdf_check="collected-pdfs/${doc_name}.pdf"
            if [[ -f "$pdf_check" ]]; then
              continue  # Build succeeded, skip
            fi

            echo ""
            echo "┌──────────────────────────────────────────────────────────────────┐"
            echo "│ FAILED: ${doc_name}.tex"
            echo "└──────────────────────────────────────────────────────────────────┘"

            # Show LaTeX log errors (most useful)
            latex_log="build-out/${doc_name}/${doc_name##*/}.log"
            if [[ -f "$latex_log" ]]; then
              echo ""
              echo "━━━ LaTeX / pdfTeX errors (from .log file) ━━━"
              grep -nE '^!|pdfTeX error|TeX capacity exceeded|Emergency stop|Fatal error occurred|^[^:]+\.tex:[0-9]+:' \
                   "$latex_log" 2>/dev/null | head -100 || echo "  (no errors matched patterns)"
              echo ""
              echo "━━━ LaTeX Warnings ━━━"
              grep -i "warning" "$latex_log" 2>/dev/null | head -30 || echo "  (no warnings)"
              echo ""
              echo "━━━ Missing Files/Packages ━━━"
              grep -iE "file.*not found|package.*not found|missing|undefined" "$latex_log" 2>/dev/null | head -20 || echo "  (none detected)"
              echo ""
              echo "━━━ Tail of .log (final 40 lines) ━━━"
              tail -40 "$latex_log" 2>/dev/null || true
            fi

            # Show stderr (latexmk errors)
            if [[ -s "$stderr_file" ]]; then
              echo ""
              echo "━━━ Build stderr ━━━"
              cat "$stderr_file" | head -50
            fi

            # Show last part of stdout (latexmk output)
            if [[ -s "$stdout_file" ]]; then
              echo ""
              echo "━━━ Build stdout (last 50 lines) ━━━"
              tail -50 "$stdout_file"
            fi

            echo ""
            echo "────────────────────────────────────────────────────────────────────"
          done

          echo ""
          echo "For complete logs, download the 'build-error-logs-${{ matrix.category }}' artifact."

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-error-logs-${{ matrix.category }}
          path: |
            build-logs/
            build-out/**/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload category PDFs
        if: always() && inputs.upload-artifacts == true
        uses: actions/upload-artifact@v6
        with:
          name: pdfs-${{ matrix.category }}
          path: collected-pdfs
          retention-days: 7
          if-no-files-found: ignore

      # ----------------------------------------------------------------------
      # Upload PlantUML diagrams as a separate per-category artifact so the
      # Pages workflow can publish them under /diagrams/<category>/...
      # ----------------------------------------------------------------------
      - name: Upload category diagrams (PNG + SVG)
        if: always() && inputs.upload-artifacts == true && inputs.render-plantuml
        uses: actions/upload-artifact@v6
        with:
          name: diagrams-${{ matrix.category }}
          path: collected-diagrams/${{ matrix.category }}
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================================
  # Stage 3: Aggregate all PDFs and diagrams into single artifacts
  # ============================================================================
  aggregate:
    needs: build
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.count.outputs.total }}
      diagrams: ${{ steps.count.outputs.diagrams }}
    steps:
      - name: Download all PDF artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: pdfs-*
          path: all-pdfs
          merge-multiple: false

      - name: Download all diagram artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: diagrams-*
          path: all-diagrams
          merge-multiple: false

      - name: Merge PDFs and diagrams
        id: count
        run: |
          set -euo pipefail

          echo "=== Downloaded PDF artifacts ==="
          find all-pdfs -type d 2>/dev/null | head -30 || true

          echo ""
          echo "=== Downloaded diagram artifacts ==="
          find all-diagrams -type d 2>/dev/null | head -30 || true

          mkdir -p merged-pdfs merged-diagrams

          # Merge PDF artifacts: artifact name pattern `pdfs-<category>` and
          # contents are already organized under <category>/... so we copy the
          # artifact contents directly into merged-pdfs/.
          for artifact_dir in all-pdfs/pdfs-*/; do
            if [[ -d "$artifact_dir" ]]; then
              echo "Merging PDFs from: $artifact_dir"
              cp -r "$artifact_dir"/* merged-pdfs/ 2>/dev/null || true
            fi
          done

          # Merge diagram artifacts: name pattern `diagrams-<category>` with
          # contents holding the per-category subtree directly. We need the
          # category folder to be the top-level entry under merged-diagrams,
          # so place the artifact contents under merged-diagrams/<category>/.
          for artifact_dir in all-diagrams/diagrams-*/; do
            if [[ -d "$artifact_dir" ]]; then
              category="$(basename "$artifact_dir")"
              category="${category#diagrams-}"
              echo "Merging diagrams from: $artifact_dir -> merged-diagrams/$category/"
              mkdir -p "merged-diagrams/$category"
              cp -r "$artifact_dir"/* "merged-diagrams/$category/" 2>/dev/null || true
            fi
          done

          echo ""
          echo "=== Merged PDF structure ==="
          find merged-pdfs -type d 2>/dev/null | sort | head -50 || true

          echo ""
          echo "=== Merged diagram structure ==="
          find merged-diagrams -type d 2>/dev/null | sort | head -50 || true

          total=$(find merged-pdfs -name "*.pdf" -type f 2>/dev/null | wc -l || echo 0)
          png_total=$(find merged-diagrams -name "*.png" -type f 2>/dev/null | wc -l || echo 0)
          svg_total=$(find merged-diagrams -name "*.svg" -type f 2>/dev/null | wc -l || echo 0)
          jpg_total=$(find merged-diagrams -name "*.jpg" -type f 2>/dev/null | wc -l || echo 0)
          diagrams=$((png_total + svg_total + jpg_total))

          {
            echo "total=$total"
            echo "diagrams=$diagrams"
            echo "png_total=$png_total"
            echo "svg_total=$svg_total"
            echo "jpg_total=$jpg_total"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "Total PDFs:           $total"
          echo "Total diagram files:  $diagrams (png=$png_total svg=$svg_total jpg=$jpg_total)"

          echo ""
          echo "=== All PDFs (first 100) ==="
          find merged-pdfs -name "*.pdf" -type f 2>/dev/null | sort | head -100

      - name: Upload merged PDFs artifact
        if: inputs.upload-artifacts == true
        uses: actions/upload-artifact@v6
        with:
          name: latex-pdfs
          path: merged-pdfs
          retention-days: 30
          if-no-files-found: warn

      - name: Upload merged diagrams artifact
        if: inputs.upload-artifacts == true
        uses: actions/upload-artifact@v6
        with:
          name: latex-diagrams
          path: merged-diagrams
          retention-days: 30
          if-no-files-found: ignore

      - name: Generate build summary
        run: |
          {
            echo "## 📄 LaTeX Build Summary"
            echo ""
            echo "| Output | Count |"
            echo "|--------|------:|"
            echo "| PDFs           | ${{ steps.count.outputs.total }} |"
            echo "| Diagram files  | ${{ steps.count.outputs.diagrams }} |"
            echo "| &nbsp;&nbsp;PNG | ${{ steps.count.outputs.png_total }} |"
            echo "| &nbsp;&nbsp;SVG | ${{ steps.count.outputs.svg_total }} |"
            echo "| &nbsp;&nbsp;JPG | ${{ steps.count.outputs.jpg_total }} |"
            echo ""
            echo "### By Category"
            echo ""
            echo "| Category | PDFs | Diagrams |"
            echo "|----------|-----:|---------:|"
            for artifact_dir in all-pdfs/pdfs-*/; do
              if [[ -d "$artifact_dir" ]]; then
                category=$(basename "$artifact_dir" | sed 's/pdfs-//')
                pdf_count=$(find "$artifact_dir" -name "*.pdf" -type f 2>/dev/null | wc -l || echo 0)
                diagram_dir="all-diagrams/diagrams-${category}"
                if [[ -d "$diagram_dir" ]]; then
                  diag_count=$(find "$diagram_dir" -type f \( -name '*.png' -o -name '*.svg' -o -name '*.jpg' \) 2>/dev/null | wc -l || echo 0)
                else
                  diag_count=0
                fi
                echo "| $category | $pdf_count | $diag_count |"
              fi
            done
            # Also include diagram-only categories with no PDF artifact
            for artifact_dir in all-diagrams/diagrams-*/; do
              if [[ -d "$artifact_dir" ]]; then
                category=$(basename "$artifact_dir" | sed 's/diagrams-//')
                if [[ ! -d "all-pdfs/pdfs-${category}" ]]; then
                  diag_count=$(find "$artifact_dir" -type f \( -name '*.png' -o -name '*.svg' -o -name '*.jpg' \) 2>/dev/null | wc -l || echo 0)
                  echo "| $category | 0 | $diag_count |"
                fi
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"



